name: Fetch FRED Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, datetime

          api_key = os.environ['FRED_API_KEY']
          # v4 indicators: L(유동성) G(성장) D(디스인플레) R(위험)
          indicators = [
            'FEDFUNDS', 'DFII10', 'DGS10', 'T10Y2Y',
            'NAPM', 'UNRATE', 'PAYEMS', 'INDPRO',
            'CPILFESL', 'T10YIE', 'CPIAUCSL',
            'BAMLH0A0HYM2'
          ]

          result = {}
          for sid in indicators:
            url = f'https://api.stlouisfed.org/fred/series/observations?series_id={sid}&api_key={api_key}&file_type=json&sort_order=desc&limit=20'
            try:
              with urllib.request.urlopen(url, timeout=15) as resp:
                data = json.loads(resp.read())
                obs = [{'date': o['date'], 'value': o['value']} for o in data.get('observations', [])]
                result[sid] = obs
                print(f'{sid}: {len(obs)} obs')
            except Exception as e:
              print(f'{sid} error: {e}')
              result[sid] = []

          output = {'updated': datetime.datetime.utcnow().isoformat() + 'Z', 'data': result}
          with open('data.json', 'w') as f:
            json.dump(output, f)
          print('data.json written')
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update FRED data [${{ github.run_id }}]"
          git push
