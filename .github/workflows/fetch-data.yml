name: Fetch FRED Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch FRED data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, time

          API_KEY = 'dd7096c0a98f837e593a75a4ae24721a'

          # Test ISM PMI candidate series
          candidates = ['NAPM','NAPMPMI','MANEMP','AMTMNO','GACDIS','MFGPROD','ISAPMFG']
          print("=== ISM PMI candidates ===")
          for sid in candidates:
            url = f'https://api.stlouisfed.org/fred/series/observations?series_id={sid}&api_key={API_KEY}&file_type=json&sort_order=desc&limit=3'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'python-urllib/3'})
              with urllib.request.urlopen(req, timeout=20) as resp:
                data = json.loads(resp.read().decode())
                if 'error_message' in data:
                  print(f'  {sid}: ERROR - {data["error_message"]}')
                else:
                  obs = data.get('observations', [])
                  latest = obs[0] if obs else None
                  print(f'  {sid}: {len(obs)} obs, latest={latest["value"]+" ("+latest["date"]+")" if latest else "none"}')
            except Exception as e:
              print(f'  {sid}: EXCEPTION {e}')
            time.sleep(0.3)

          # Main fetch
          indicators = [
            'FEDFUNDS', 'DFII10', 'DGS10', 'T10Y2Y',
            'NAPM', 'UNRATE', 'PAYEMS', 'INDPRO',
            'CPILFESL', 'T10YIE', 'CPIAUCSL',
            'BAMLH0A0HYM2'
          ]
          result = {}
          print("=== Main fetch ===")
          for sid in indicators:
            url = f'https://api.stlouisfed.org/fred/series/observations?series_id={sid}&api_key={API_KEY}&file_type=json&sort_order=desc&limit=20'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'python-urllib/3'})
              with urllib.request.urlopen(req, timeout=20) as resp:
                data = json.loads(resp.read().decode())
                if 'error_message' in data:
                  print(f'  {sid}: ERROR - {data["error_message"]}')
                  result[sid] = []
                else:
                  obs = [{'date': o['date'], 'value': o['value']} for o in data.get('observations', [])]
                  result[sid] = obs
                  print(f'  {sid}: {len(obs)} obs')
            except Exception as e:
              print(f'  {sid}: EXCEPTION {e}')
              result[sid] = []
            time.sleep(0.3)

          output = {'updated': datetime.datetime.utcnow().isoformat() + 'Z', 'data': result}
          with open('data.json', 'w') as f:
            json.dump(output, f)
          print('data.json written')
          PYEOF

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update FRED data"
            git push origin HEAD:main
          fi
