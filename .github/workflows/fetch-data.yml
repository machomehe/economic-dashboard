name: Fetch FRED Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch FRED data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, time

          API_KEY = 'dd7096c0a98f837e593a75a4ae24721a'

          # NAPM -> DGORDER (내구재 주문)
          indicators = [
            'FEDFUNDS', 'DFII10', 'DGS10', 'T10Y2Y',
            'DGORDER', 'UNRATE', 'PAYEMS', 'INDPRO',
            'CPILFESL', 'T10YIE', 'CPIAUCSL',
            'BAMLH0A0HYM2'
          ]

          def fetch_series(sid, retries=3):
            url = f'https://api.stlouisfed.org/fred/series/observations?series_id={sid}&api_key={API_KEY}&file_type=json&sort_order=desc&limit=20'
            for attempt in range(retries):
              try:
                req = urllib.request.Request(url, headers={'User-Agent': 'python-urllib/3'})
                with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read().decode())
                  if 'error_message' in data:
                    print(f'  {sid} API error: {data["error_message"]}')
                    return []
                  obs = [{'date': o['date'], 'value': o['value']} for o in data.get('observations', [])]
                  print(f'  {sid}: {len(obs)} obs, latest={obs[0]["value"]+" ("+obs[0]["date"]+")" if obs else "none"}')
                  return obs
              except Exception as e:
                print(f'  {sid} attempt {attempt+1} failed: {e}')
                if attempt < retries - 1:
                  time.sleep(2)
            return []

          result = {}
          for sid in indicators:
            result[sid] = fetch_series(sid)
            time.sleep(1)

          output = {'updated': datetime.datetime.utcnow().isoformat() + 'Z', 'data': result}
          with open('data.json', 'w') as f:
            json.dump(output, f)
          print('data.json written OK')
          PYEOF

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update FRED data"
            git push origin HEAD:main
          fi
