name: Fetch FRED Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch FRED data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, time

          API_KEY = 'dd7096c0a98f837e593a75a4ae24721a'

          indicators = [
            'FEDFUNDS', 'DFII10', 'DGS10', 'T10Y2Y',
            'NAPM', 'UNRATE', 'PAYEMS', 'INDPRO',
            'CPILFESL', 'T10YIE', 'CPIAUCSL',
            'BAMLH0A0HYM2'
          ]

          result = {}
          for sid in indicators:
            url = f'https://api.stlouisfed.org/fred/series/observations?series_id={sid}&api_key={API_KEY}&file_type=json&sort_order=desc&limit=20'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=20) as resp:
                raw = resp.read().decode('utf-8')
                data = json.loads(raw)
                if 'error_message' in data:
                  print(f'{sid} API error: {data["error_message"]}')
                  result[sid] = []
                else:
                  obs = [{'date': o['date'], 'value': o['value']} for o in data.get('observations', [])]
                  result[sid] = obs
                  print(f'{sid}: {len(obs)} obs, latest={obs[0]["value"] if obs else "N/A"}')
            except Exception as e:
              print(f'{sid} exception: {e}')
              result[sid] = []
            time.sleep(0.3)

          output = {'updated': datetime.datetime.utcnow().isoformat() + 'Z', 'data': result}
          with open('data.json', 'w') as f:
            json.dump(output, f)
          print('data.json written OK')
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update FRED data"
            git push
          fi
