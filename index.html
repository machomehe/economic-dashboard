<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제 브리핑</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Inter,-apple-system,system-ui,sans-serif;letter-spacing:-.01em;background:#fff;color:#222;}

/* 테이블 공통 스타일 */
table.indicators{width:100%;border-collapse:collapse;font-size:.78rem;table-layout:fixed;}
table.indicators td{padding:6px 4px;vertical-align:top;word-break:keep-all;overflow-wrap:break-word;}
table.indicators tr{border-bottom:1px solid #eee;}
/* 열 너비 지정: 지표명 28%, 값 18%, 설명 36%, 발표일 18% */
table.indicators col.col-name{width:28%;}
table.indicators col.col-val{width:18%;}
table.indicators col.col-desc{width:36%;}
table.indicators col.col-date{width:18%;}
/* 발표일 열: 줄바꿈 허용, 최소 가독성 확보 */
table.indicators td:nth-child(4){color:#999;font-size:.65rem;line-height:1.4;}
/* 접근성: 낮은 대비 색상 개선 (#bbb -> #999, #ccc -> #999) */
.footer-note{font-size:.62rem;color:#999;text-align:center;padding:20px 0 10px;}

/* 버전 네비게이션 버튼 */
.ver-btn{
  padding:4px 10px;border-radius:12px;font-size:.68rem;font-weight:600;
  border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;
  transition:all .2s;
}
.ver-btn:hover{background:#f5f5f5;border-color:#aaa;}
.ver-btn.active{background:#222;color:#fff;border-color:#222;}

/* 모바일 반응형 */
@media(max-width:680px){
  table.indicators{font-size:.72rem;}
  table.indicators td{padding:5px 3px;}
  table.indicators td:nth-child(3){font-size:.65rem;}
  table.indicators td:nth-child(4){font-size:.6rem;}
  /* 요약 바 모바일 세로 배치 */
  .summary-bar{flex-wrap:wrap;height:auto!important;line-height:1.6!important;}
  .summary-bar>div{flex:1 1 50%!important;padding:4px 0;}
}
@media(max-width:400px){
  table.indicators col.col-name{width:30%;}
  table.indicators col.col-val{width:20%;}
  table.indicators col.col-desc{width:30%;}
  table.indicators col.col-date{width:20%;}
  table.indicators{font-size:.68rem;}
}
</style>
</head>
<body>
<div style="max-width:680px;margin:0 auto;padding:20px;">

  <!-- 네비게이션 -->
  <div id="version-nav" style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:.7rem;color:#888;margin-right:4px;">버전:</span>
    <!-- JS로 버튼 동적 생성 -->
  </div>

  <!-- 콘텐츠 영역 -->
  <div id="briefing-content">
    <!-- fallback: 기본 브리핑 콘텐츠 (JS 로드 실패 시 표시) -->
  </div>

</div>

<script>
(function(){
  var navEl = document.getElementById('version-nav');
  var contentEl = document.getElementById('briefing-content');
  var versions = [];
  var currentDate = null;

  // 브리핑 HTML을 fetch하여 콘텐츠 영역에 삽입
  function loadBriefing(date, file) {
    currentDate = date;
    // 활성 버튼 업데이트
    var btns = navEl.querySelectorAll('.ver-btn');
    btns.forEach(function(btn) {
      if (btn.dataset.date === date) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    // URL hash 업데이트
    history.replaceState(null, '', '#' + date);
    // fetch 브리핑
    fetch(file)
      .then(function(res) {
        if (!res.ok) throw new Error('로드 실패');
        return res.text();
      })
      .then(function(html) {
        contentEl.innerHTML = html;
      })
      .catch(function() {
        contentEl.innerHTML = '<div style="padding:40px 0;text-align:center;color:#999;font-size:.82rem;">브리핑을 불러올 수 없습니다.</div>';
      });
  }

  // 네비게이션 버튼 렌더링
  function renderNav(versions) {
    // 최근 5개만 표시 (오래된 순 -> 최신 순, 최신이 오른쪽)
    var recent = versions.slice(-5);
    recent.forEach(function(v) {
      var btn = document.createElement('button');
      btn.className = 'ver-btn';
      btn.textContent = v.label;
      btn.dataset.date = v.date;
      btn.addEventListener('click', function() {
        loadBriefing(v.date, v.file);
      });
      navEl.appendChild(btn);
    });
  }

  // 초기화
  fetch('versions.json')
    .then(function(res) {
      if (!res.ok) throw new Error('versions.json 로드 실패');
      return res.json();
    })
    .then(function(data) {
      versions = data.versions || [];
      if (versions.length === 0) return;
      renderNav(versions);

      // URL hash에서 버전 결정
      var hash = location.hash.replace('#', '');
      var target = null;
      if (hash) {
        target = versions.find(function(v) { return v.date === hash; });
      }
      // hash가 없거나 유효하지 않으면 최신 버전 로드
      if (!target) {
        target = versions[versions.length - 1];
      }
      loadBriefing(target.date, target.file);
    })
    .catch(function() {
      // versions.json 로드 실패 시 네비게이션 숨기고 fallback 브리핑 직접 로드 시도
      navEl.style.display = 'none';
      fetch('briefings/260402.html')
        .then(function(res) { return res.ok ? res.text() : Promise.reject(); })
        .then(function(html) { contentEl.innerHTML = html; })
        .catch(function() {
          contentEl.innerHTML = '<div style="padding:40px 0;text-align:center;color:#999;font-size:.82rem;">브리핑을 불러올 수 없습니다.</div>';
        });
    });

  // 브라우저 뒤로/앞으로 시 hash 변경 감지
  window.addEventListener('hashchange', function() {
    var hash = location.hash.replace('#', '');
    if (hash && hash !== currentDate) {
      var target = versions.find(function(v) { return v.date === hash; });
      if (target) {
        loadBriefing(target.date, target.file);
      }
    }
  });
})();
</script>
</body>
</html>
