<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제지표 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f8f8;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px}
h1{font-size:1.3rem;font-weight:700}
.subtitle{font-size:.72rem;color:#888;margin-top:3px}
.last-update{font-size:.7rem;color:#888;text-align:right}
.refresh-btn{background:#f0f0f0;border:1px solid #e0e0e0;color:#1a1a1a;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.78rem;margin-top:4px}
.refresh-btn:hover{background:#e0e0e0}
.status-bar{display:flex;gap:14px;margin-bottom:16px;font-size:.72rem;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:7px 12px;border-radius:8px;background:rgba(0,0,0,0.04);border-left:3px solid #555}
.section-label{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:12px;background:#555;color:#fff;flex-shrink:0}
.section-title{font-size:.9rem;font-weight:600}
.section-desc{font-size:.72rem;color:#888}
.card-name-link{color:inherit;text-decoration:none}
.card-name-link:hover{text-decoration:underline;color:#555}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:9px;padding:13px;display:block;color:inherit;position:relative}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-name{font-size:.83rem;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-symbol{font-size:.65rem;color:#aaa;font-family:monospace;margin-top:2px}
.badge{font-size:.6rem;color:#ccc;white-space:nowrap}
.card-value-row{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.card-value{font-size:1.5rem;font-weight:700}
.card-latest-date{font-size:.65rem;color:#aaa}
.card-change{font-size:.77rem;margin-bottom:9px}
.p{color:#27ae60}.n{color:#9e9e9e}.ng{color:#e53935}
.chart-wrap{height:100px}canvas{max-width:100%}
.save-toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:8px;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-toast.show{opacity:1}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div><h1>📊 경제지표 대시보드</h1>
  <div class="subtitle">Federal Reserve Economic Data (FRED) — 미국 주요 경제지표</div></div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <div class="last-update" id="lastUpdate">로딩 중...</div>
    <button class="refresh-btn" onclick="reloadDash()">↻ 새로고침</button>
  </div>
</header>

<div class="status-bar">
  <span id="statusDot"><span class="dot" style="background:#ccc"></span>데이터 로딩 중...</span>
  <span><span class="dot" style="background:#9e9e9e"></span>출처: FRED</span>
</div>
<div id="dashboard"></div>

<div class="save-toast" id="toast"></div>

<script>
const GROUPS=[
  {key:'L',name:'유동성',desc:'Liquidity',items:[
    {id:'FEDFUNDS',title:'정책금리',   unit:'%',mode:'level',rel:'neg',t:[3.0,4.5]},
    {id:'DFII10',  title:'실질금리 10Y',unit:'%',mode:'level',rel:'neg',t:[0.5,1.5]},
    {id:'DGS10',   title:'국채금리 10Y',unit:'%',mode:'level',rel:'neg',t:[3.5,4.5]},
    {id:'T10Y2Y',  title:'수익률곡선', unit:'%',mode:'level',rel:'pos',t:[0.0,0.5]},
  ]},
  {key:'G',name:'성장',desc:'Growth',items:[
    {id:'DGORDER', title:'내구재 주문',unit:'',  mode:'dir',  rel:'pos',t:[-2.0,0.0]},
    {id:'UNRATE',  title:'실업률',    unit:'%',  mode:'level',rel:'neg',t:[4.5,5.5]},
    {id:'PAYEMS',  title:'비농업고용',unit:'',   mode:'dir',  rel:'pos',t:[-50,50]},
    {id:'INDPRO',  title:'산업생산', unit:'',    mode:'dir',  rel:'pos',t:[-0.5,0.0]},
  ]},
  {key:'D',name:'디스인플레',desc:'Dis-inflation',items:[
    {id:'CPILFESL',title:'코어 CPI',  unit:'',  mode:'yoy',   rel:'neg',t:[3.0,4.0]},
    {id:'T10YIE',  title:'기대인플레',unit:'%', mode:'target',rel:'neg',t:[0.7,1.2]},
    {id:'CPIAUCSL',title:'CPI',       unit:'',  mode:'yoy',   rel:'neg',t:[3.0,4.0]},
  ]},
  {key:'R',name:'위험',desc:'Risk',items:[
    {id:'BAMLH0A0HYM2',title:'하이일드 스프레드',unit:'%',mode:'level',rel:'neg',t:[3.5,5.0]},
  ]},
];

const FRED_NAME={
  FEDFUNDS:'Fed Funds Rate',DFII10:'TIPS Real Yield 10Y',DGS10:'US Treasury 10Y',
  T10Y2Y:'10Y-2Y Spread',DGORDER:'Durable Goods Orders',UNRATE:'Unemployment Rate',
  PAYEMS:'Nonfarm Payrolls',INDPRO:'Industrial Production',CPILFESL:'Core CPI',
  T10YIE:'Breakeven Inflation 10Y',CPIAUCSL:'CPI All Urban',BAMLH0A0HYM2:'HY OAS Spread',
};

const C={p:'#27ae60',n:'#9e9e9e',ng:'#e53935'};

function classify(item,value,diff,prev,valid){
  const[t0,t1]=item.t;const rel=item.rel||'neg';
  let v=value;
  if(item.mode==='yoy'){
    if(valid&&valid.length>=13){const ya=parseFloat(valid[12].value);if(!isNaN(ya)&&ya>0)v=(value/ya-1)*100;}
  }else if(item.mode==='dir'){
    v=diff||0;
    if(item.id==='DGORDER'||item.id==='INDPRO')v=prev&&prev!==0?(diff/prev)*100:0;
  }else if(item.mode==='target'){
    v=Math.abs(value-2.0);return v<=t0?'p':v<=t1?'n':'ng';
  }
  if(rel==='neg')return v<=t0?'p':v<=t1?'n':'ng';
  return v<t0?'ng':v<t1?'n':'p';
}

const zonePlugin={
  id:'zonePlugin',
  beforeDatasetsDraw(chart){
    const o=chart.options.plugins&&chart.options.plugins.zonePlugin;
    if(!o||!o.zones)return;
    const{ctx,chartArea,scales}=chart;
    if(!chartArea||!scales.y)return;
    const{left,right,top,bottom}=chartArea,ys=scales.y;
    o.zones.forEach(z=>{
      const yT=z.yMax===Infinity?top:Math.max(top,ys.getPixelForValue(z.yMax));
      const yB=z.yMin===-Infinity?bottom:Math.min(bottom,ys.getPixelForValue(z.yMin));
      if(yT>=yB)return;ctx.fillStyle=z.color;ctx.fillRect(left,yT,right-left,yB-yT);
    });
    (o.thresholds||[]).forEach(th=>{
      const y=ys.getPixelForValue(th.value);
      if(y<top||y>bottom)return;
      ctx.save();ctx.strokeStyle=th.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.6;
      ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(right,y);ctx.stroke();ctx.restore();
    });
  }
};

function getZoneCfg(item){
  if(item.mode!=='level'&&item.mode!=='target')return null;
  const[t0,t1]=item.t;
  const ga='rgba(39,174,96,0.13)',ra='rgba(229,57,53,0.13)',gl='#27ae60',rl='#e53935';
  if(item.mode==='target'){
    const c=2.0,g0=c-t0,g1=c+t0,n0=c-t1,n1=c+t1;
    return{zones:[{yMin:g0,yMax:g1,color:ga},{yMin:-Infinity,yMax:n0,color:ra},{yMin:n1,yMax:Infinity,color:ra}],
           thresholds:[{value:g0,color:gl},{value:g1,color:gl},{value:n0,color:rl},{value:n1,color:rl}]};
  }
  if(item.rel==='neg')return{zones:[{yMin:-Infinity,yMax:t0,color:ga},{yMin:t1,yMax:Infinity,color:ra}],thresholds:[{value:t0,color:gl},{value:t1,color:rl}]};
  return{zones:[{yMin:-Infinity,yMax:t0,color:ra},{yMin:t1,yMax:Infinity,color:ga}],thresholds:[{value:t0,color:rl},{value:t1,color:gl}]};
}

function getPointColor(item,value){
  if(item.mode!=='level')return null;
  const[t0,t1]=item.t;
  if(item.rel==='neg')return value<=t0?C.p:value<=t1?C.n:C.ng;
  return value<t0?C.ng:value<t1?C.n:C.p;
}

const charts={};let cachedData=null;
function fmtDate(d){const[y,m]=d.split('-');return parseInt(m)+'/'+y.slice(2);}
function fmt(v,u){if(v===null||v===undefined||isNaN(parseFloat(v)))return'N/A';const n=parseFloat(v);const s=Math.abs(n)>=1000?n.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2}):n.toFixed(2);return u==='$'?'$'+s:u==='%'?s+'%':s;}

function buildCard(item){
  const div=document.createElement('div');div.className='card';div.id='card-'+item.id;
  const fredSub=FRED_NAME[item.id];
  const symLine=fredSub?item.id+' · '+fredSub:item.id;
  const fredUrl='https://fred.stlouisfed.org/series/'+item.id;
  const badge=item.rel==='pos'?'비례':'반비례';
  div.innerHTML=
    '<div class="card-header">'+
      '<div>'+
        '<div class="card-name">'+
          '<a class="card-name-link" href="'+fredUrl+'" target="_blank" rel="noopener noreferrer">'+item.title+'</a>'+
        '</div>'+
        '<div class="card-symbol">'+symLine+'</div>'+
      '</div>'+
      '<span class="badge">'+badge+'</span>'+
    '</div>'+
    '<div class="card-value-row"><div class="card-value" id="val-'+item.id+'"><span style="color:#aaa;font-size:.8rem">—</span></div><div class="card-latest-date" id="date-'+item.id+'"></div></div>'+
    '<div class="card-change" id="chg-'+item.id+'"></div>'+
    '<div class="chart-wrap"><canvas id="chart-'+item.id+'"></canvas></div>';
  return div;
}

function renderCard(item,obs){
  const valEl=document.getElementById('val-'+item.id);
  const dateEl=document.getElementById('date-'+item.id);
  const chgEl=document.getElementById('chg-'+item.id);
  if(!valEl)return;
  const valid=(obs||[]).filter(d=>d.value!=='.'&&!isNaN(parseFloat(d.value)));
  if(!valid.length){valEl.innerHTML='<span style="color:#aaa;font-size:.8rem">데이터 없음</span>';return;}
  const latest=parseFloat(valid[0].value),prev=valid.length>1?parseFloat(valid[1].value):null,diff=prev!==null?latest-prev:null;
  const key=classify(item,latest,diff,prev,valid),color=C[key];
  valEl.textContent=fmt(latest,item.unit);valEl.style.color=color;
  dateEl.textContent=fmtDate(valid[0].date);
  if(diff!==null){const arrow=diff>0?'▲':diff<0?'▼':'→';chgEl.innerHTML='<span class="'+key+'">'+arrow+' '+(diff>0?'+':'')+diff.toFixed(2)+item.unit+' 전기 대비</span>';}
  const cd=valid.slice(0,13).reverse().map(d=>parseFloat(d.value));
  const lb=valid.slice(0,13).reverse().map(d=>fmtDate(d.date));
  const ctx=document.getElementById('chart-'+item.id);if(!ctx)return;
  if(charts[item.id])charts[item.id].destroy();
  const zoneCfg=getZoneCfg(item)||{};
  const ptColors=cd.map(v=>{const c=getPointColor(item,v);return c||color;});
  charts[item.id]=new Chart(ctx,{type:'line',
    data:{labels:lb,datasets:[{data:cd,borderWidth:1.5,fill:false,
      segment:{borderColor:ctx2=>{const c=getPointColor(item,cd[ctx2.p0DataIndex]);return c||color;}},
      pointRadius:4,pointHoverRadius:6,pointBackgroundColor:ptColors,pointBorderColor:ptColors,tension:0}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:true,callbacks:{title:i=>i[0].label,label:c=>' '+fmt(c.parsed.y,item.unit)}},zonePlugin:zoneCfg},
      scales:{
        x:{display:true,ticks:{color:'#aaa',font:{size:8},maxRotation:45,minRotation:30,
          callback:function(val,idx,ticks){const label=this.getLabelForValue(val);if(!label)return null;
            if(idx===ticks.length-1)return label;const month=parseInt(label.split('/')[0]);
            return(month===1||month===4||month===7||month===10)?label:null;}},grid:{color:'#f0f0f0'}},
        y:{display:true,position:'right',ticks:{color:'#aaa',font:{size:8},maxTicksLimit:3},grid:{color:'#f0f0f0'}}},
      animation:false},
    plugins:[zonePlugin]});
}

function renderAll(data){
  GROUPS.forEach(g=>g.items.forEach(item=>renderCard(item,data[item.id]||[])));
}

function buildDashboard(){
  Object.keys(charts).forEach(k=>{try{charts[k].destroy();}catch(e){}delete charts[k];});
  const dash=document.getElementById('dashboard');dash.innerHTML='';
  GROUPS.forEach(g=>{
    const sec=document.createElement('div');sec.className='section';
    sec.innerHTML=
      '<div class="section-header">'+
        '<span class="section-label">'+g.key+'</span>'+
        '<span class="section-title">'+g.name+'</span>'+
        '<span class="section-desc">· '+g.desc+'</span>'+
      '</div>'+
      '<div class="grid" id="grid-'+g.key+'"></div>';
    dash.appendChild(sec);
    const grid=sec.querySelector('#grid-'+g.key);
    g.items.forEach(item=>grid.appendChild(buildCard(item)));
  });
}

async function loadAll(){
  try{
    const r=await fetch('data.json?t='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();cachedData=j.data;renderAll(cachedData);
    const upd=j.updated?new Date(j.updated).toLocaleString('ko-KR'):'알 수 없음';
    document.getElementById('lastUpdate').textContent='데이터 기준: '+upd;
    document.getElementById('statusDot').innerHTML='<span class="dot" style="background:#27ae60"></span>FRED 연결됨';
  }catch(e){
    document.getElementById('lastUpdate').textContent='⚠ '+e.message;
    document.getElementById('statusDot').innerHTML='<span class="dot" style="background:#e53935"></span>오류';
  }
}
function reloadDash(){cachedData=null;buildDashboard();loadAll();}

buildDashboard();loadAll();
</script>
</body>
</html>
