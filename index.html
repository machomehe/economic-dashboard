<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제지표 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px}
h1{font-size:1.4rem;font-weight:700}
.subtitle{font-size:.75rem;color:#8b949e;margin-top:4px}
.last-update{font-size:.72rem;color:#8b949e;text-align:right}
.refresh-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.8rem}
.refresh-btn:hover{background:#30363d}
.status-bar{display:flex;gap:12px;margin-bottom:16px;font-size:.75rem;flex-wrap:wrap}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-green{background:#3fb950}.dot-blue{background:#58a6ff}.dot-yellow{background:#d29922}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
.card.up{border-left:3px solid #3fb950}.card.down{border-left:3px solid #f85149}.card.neutral{border-left:3px solid #58a6ff}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-title{font-size:.85rem;color:#8b949e;font-weight:500}.card-id{font-size:.7rem;color:#484f58}
.card-value{font-size:1.6rem;font-weight:700;margin-bottom:4px}
.card-change{font-size:.8rem;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.change-up{color:#3fb950}.change-down{color:#f85149}.change-neutral{color:#8b949e}
.error-msg{color:#f85149;font-size:.8rem;padding:8px 0}.loading-msg{color:#8b949e;font-size:.8rem;padding:8px 0}
.chart-wrap{height:90px}canvas{max-width:100%}
@media(max-width:480px){.grid{grid-template-columns:1fr}h1{font-size:1.2rem}}
</style>
</head>
<body>
<header>
  <div>
    <h1>📊 경제지표 대시보드</h1>
    <div class="subtitle">FRED — 실시간 미국 주요 경제지표</div>
  </div>
  <div style="text-align:right">
    <div class="last-update" id="lastUpdate">로딩 중...</div>
    <button class="refresh-btn" onclick="location.reload()">↻ 새로고침</button>
  </div>
</header>
<div class="status-bar">
  <span id="statusDot"><span class="status-dot dot-yellow"></span>데이터 로딩 중...</span>
  <span><span class="status-dot dot-blue"></span>출처: Federal Reserve Bank of St. Louis</span>
</div>
<div class="grid" id="grid"></div>
<script>
const INDICATORS=[
  {id:'FEDFUNDS',label:'기준금리 (FFR)',unit:'%'},
  {id:'CPIAUCSL',label:'소비자물가 (CPI)',unit:''},
  {id:'UNRATE',label:'실업률',unit:'%'},
  {id:'A191RL1Q225SBEA',label:'GDP 성장률',unit:'%'},
  {id:'DGS10',label:'국채 10년',unit:'%'},
  {id:'DGS2',label:'국채 2년',unit:'%'},
  {id:'DTWEXBGS',label:'달러 인덱스',unit:''},
  {id:'DCOILWTICO',label:'WTI 원유',unit:'$'}
];
const charts={};
function fmt(v,u){if(!v||isNaN(v))return'N/A';const n=parseFloat(v).toFixed(2);return u==='$'?'$'+n:u==='%'?n+'%':n}
function buildCard(ind){
  const d=document.createElement('div');d.className='card neutral';d.id='card-'+ind.id;
  d.innerHTML=`<div class="card-header"><span class="card-title">${ind.label}</span><span class="card-id">${ind.id}</span></div><div class="card-value" id="val-${ind.id}"><span class="loading-msg">로딩 중...</span></div><div class="card-change" id="chg-${ind.id}"></div><div class="chart-wrap"><canvas id="chart-${ind.id}"></canvas></div>`;
  return d;
}
function renderCard(ind,obs){
  const card=document.getElementById('card-'+ind.id);
  const valEl=document.getElementById('val-'+ind.id);
  const chgEl=document.getElementById('chg-'+ind.id);
  const valid=(obs||[]).filter(d=>d.value!=='.'&&!isNaN(parseFloat(d.value)));
  if(!valid.length){valEl.innerHTML='<span class="error-msg">⚠ 데이터 없음</span>';return}
  const latest=parseFloat(valid[0].value),prev=valid.length>1?parseFloat(valid[1].value):null;
  const diff=prev!==null?latest-prev:null;
  valEl.textContent=fmt(latest,ind.unit);
  if(diff!==null){
    const cls=diff>0?'change-up':diff<0?'change-down':'change-neutral';
    const arrow=diff>0?'▲':diff<0?'▼':'→';
    chgEl.innerHTML=`<span class="${cls}">${arrow} ${diff>0?'+':''}${diff.toFixed(2)}${ind.unit} 전월비</span>`;
    card.className='card '+(diff>0?'up':diff<0?'down':'neutral');
  }
  const cd=valid.slice(0,13).reverse().map(d=>parseFloat(d.value));
  const lb=valid.slice(0,13).reverse().map(d=>d.date.slice(0,7));
  const ctx=document.getElementById('chart-'+ind.id);if(!ctx)return;
  if(charts[ind.id])charts[ind.id].destroy();
  const color=diff>0?'#3fb950':diff<0?'#f85149':'#58a6ff';
  charts[ind.id]=new Chart(ctx,{
    type:'line',
    data:{
      labels:lb,
      datasets:[{
        data:cd,
        borderColor:color,
        borderWidth:1.5,
        fill:true,
        backgroundColor:color+'18',
        pointRadius:4,
        pointHoverRadius:6,
        pointBackgroundColor:color,
        pointBorderColor:color,
        tension:0
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          enabled:true,
          callbacks:{
            label:ctx=>` ${fmt(ctx.parsed.y,ind.unit)}`
          }
        }
      },
      scales:{
        x:{
          display:true,
          ticks:{
            color:'#484f58',
            font:{size:9},
            maxRotation:45,
            minRotation:30,
            maxTicksLimit:6
          },
          grid:{color:'#21262d'}
        },
        y:{
          display:true,
          position:'right',
          ticks:{
            color:'#484f58',
            font:{size:9},
            maxTicksLimit:4
          },
          grid:{color:'#21262d'}
        }
      },
      animation:false
    }
  });
}
async function loadAll(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok)throw new Error('data.json HTTP '+r.status);
    const j=await r.json();
    INDICATORS.forEach(ind=>renderCard(ind,j.data[ind.id]||[]));
    const upd=j.updated?new Date(j.updated).toLocaleString('ko-KR'):'알 수 없음';
    document.getElementById('lastUpdate').textContent='데이터 기준: '+upd;
    document.getElementById('statusDot').innerHTML='<span class="status-dot dot-green"></span>FRED 연결됨';
  }catch(e){
    document.getElementById('lastUpdate').textContent='⚠ '+e.message;
    document.getElementById('statusDot').innerHTML='<span class="status-dot" style="background:#f85149"></span>오류';
    console.error(e);
  }
}
const grid=document.getElementById('grid');
INDICATORS.forEach(ind=>grid.appendChild(buildCard(ind)));
loadAll();
</script>
</body>
</html>
