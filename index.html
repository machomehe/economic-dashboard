<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제지표 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-card-hover: #22272e;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-purple: #a371f7;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .header-left .subtitle {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .last-update {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .refresh-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: var(--accent-blue);
  }

  .refresh-btn .spin { display: none; }
  .refresh-btn.loading .spin { display: inline-block; animation: spin 1s linear infinite; }
  .refresh-btn.loading .icon { display: none; }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 16px;
  }

  .loading-overlay.hidden { display: none; }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    color: var(--text-secondary);
    font-size: 0.9rem;
  }

  .loading-progress {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .loading-dot {
    width: 6px; height: 6px;
    background: var(--accent-blue);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px)  { .grid { grid-template-columns: 1fr; } }

  /* CARD */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--accent-blue));
    border-radius: 12px 12px 0 0;
  }

  .card:hover {
    border-color: var(--card-accent, var(--accent-blue));
    box-shadow: 0 0 0 1px var(--card-accent, var(--accent-blue))22, var(--shadow);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-code {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: var(--bg-secondary);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .card-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }

  .card-unit {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 4px;
  }

  .card-change {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
  }

  .change-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .change-badge.up   { background: rgba(63,185,80,0.12);  color: var(--accent-green); }
  .change-badge.down { background: rgba(248,81,73,0.12);  color: var(--accent-red);   }
  .change-badge.flat { background: rgba(139,148,158,0.12); color: var(--text-muted);  }

  .change-badge.inverted.up   { background: rgba(248,81,73,0.12);  color: var(--accent-red);   }
  .change-badge.inverted.down { background: rgba(63,185,80,0.12);  color: var(--accent-green); }

  .change-label {
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  /* SPARKLINE */
  .sparkline-wrap {
    position: relative;
    height: 60px;
    margin-bottom: 10px;
  }

  .sparkline-wrap canvas { width: 100% !important; height: 100% !important; }

  /* FOOTER */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-date {
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .card-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 6px var(--accent-green);
  }

  /* ERROR STATE */
  .card.error .card-value { font-size: 1rem; color: var(--accent-red); }

  /* MARKET STATUS */
  .status-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .status-dot.live { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); animation: blink 2s ease-in-out infinite; }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">FRED API에서 데이터를 불러오는 중...</div>
  <div class="loading-progress">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>📊 경제지표 대시보드</h1>
    <div class="subtitle">Federal Reserve Economic Data (FRED) — 실시간 미국 주요 경제지표</div>
  </div>
  <div class="header-right">
    <div class="last-update" id="lastUpdate">—</div>
    <button class="refresh-btn" onclick="loadAll()" id="refreshBtn">
      <span class="icon">↻</span>
      <span class="spin">↻</span>
      새로고침
    </button>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-item"><div class="status-dot live"></div> FRED API 연결됨</div>
  <div class="status-item"><div class="status-dot" style="background:var(--accent-blue)"></div> 데이터 출처: Federal Reserve Bank of St. Louis</div>
</div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<script>
const API_KEY = 'dd7096c0a98f837e593a75a4ae24721a';
const BASE    = 'https://api.stlouisfed.org/fred/series/observations';

// Indicator config
const INDICATORS = [
  {
    id: 'FEDFUNDS',
    title: '기준금리 (FFR)',
    unit: '%',
    accentColor: '#58a6ff',
    invertColors: false,  // 상승 = 빨강 (인플레이션 우려), 하락 = 초록 (완화)
    invertColors: true,   // 금리 인상은 시장에 부정적 → 상승=빨강
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(2),
    changeLabel: '전월 대비',
  },
  {
    id: 'CPIAUCSL',
    title: '미국 소비자물가지수 (CPI)',
    unit: 'pt',
    accentColor: '#f0883e',
    invertColors: true,
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(1),
    changeLabel: '전월 대비',
  },
  {
    id: 'UNRATE',
    title: '실업률',
    unit: '%',
    accentColor: '#e3b341',
    invertColors: true,   // 상승 = 나쁨 (빨강), 하락 = 좋음 (초록)
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(1),
    changeLabel: '전월 대비',
  },
  {
    id: 'A191RL1Q225SBEA',
    title: 'GDP 성장률',
    unit: '%',
    accentColor: '#3fb950',
    invertColors: false,  // 상승 = 좋음 (초록)
    limit: 20,
    formatVal: v => parseFloat(v).toFixed(1),
    changeLabel: '전분기 대비',
  },
  {
    id: 'DGS10',
    title: '미국 10년 국채금리',
    unit: '%',
    accentColor: '#a371f7',
    invertColors: true,
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(2),
    changeLabel: '전주 대비',
  },
  {
    id: 'DGS2',
    title: '미국 2년 국채금리',
    unit: '%',
    accentColor: '#bc8cff',
    invertColors: true,
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(2),
    changeLabel: '전주 대비',
  },
  {
    id: 'DTWEXBGS',
    title: '달러 인덱스 (DXY)',
    unit: 'pt',
    accentColor: '#58a6ff',
    invertColors: false,
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(2),
    changeLabel: '전주 대비',
  },
  {
    id: 'DCOILWTICO',
    title: 'WTI 유가',
    unit: 'USD/배럴',
    accentColor: '#d2a679',
    invertColors: false,
    limit: 24,
    formatVal: v => parseFloat(v).toFixed(2),
    changeLabel: '전주 대비',
  },
];

// Chart instances map
const chartInstances = {};

async function fetchSeries(seriesId, limit) {
  const url = `${BASE}?series_id=${seriesId}&api_key=${API_KEY}&file_type=json&limit=${limit}&sort_order=desc`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  // Filter out '.' (missing values), keep valid
  const obs = (data.observations || []).filter(o => o.value !== '.');
  return obs; // newest first
}

function arrow(dir) {
  if (dir > 0) return '▲';
  if (dir < 0) return '▼';
  return '—';
}

function changeClass(dir, invert) {
  if (dir === 0) return 'flat';
  const isPositive = dir > 0;
  if (invert) return isPositive ? 'up inverted' : 'down inverted';
  return isPositive ? 'up' : 'down';
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
}

function buildSparkline(canvasId, values, accentColor) {
  // values: oldest → newest
  if (chartInstances[canvasId]) {
    chartInstances[canvasId].destroy();
    delete chartInstances[canvasId];
  }
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;

  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const last = values[values.length - 1];
  const first = values[0];
  const trending = last >= first;

  const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 60);
  gradient.addColorStop(0, accentColor + '44');
  gradient.addColorStop(1, accentColor + '00');

  chartInstances[canvasId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: values.map((_, i) => i),
      datasets: [{
        data: values,
        borderColor: accentColor,
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 3,
        fill: true,
        backgroundColor: gradient,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600 },
      plugins: { legend: { display: false }, tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.parsed.y}`
        },
        backgroundColor: '#22272e',
        borderColor: '#30363d',
        borderWidth: 1,
        titleFont: { size: 10 },
        bodyFont: { size: 11 },
      }},
      scales: {
        x: { display: false },
        y: {
          display: false,
          min: min - range * 0.1,
          max: max + range * 0.1,
        }
      },
      interaction: { intersect: false, mode: 'index' },
    }
  });
}

function renderCard(indicator, obs) {
  // obs: newest first
  const latest   = obs[0];
  const previous = obs[1];

  const currentVal = parseFloat(latest.value);
  const prevVal    = previous ? parseFloat(previous.value) : null;
  const diff       = prevVal !== null ? currentVal - prevVal : null;
  const diffDir    = diff === null ? 0 : (diff > 0 ? 1 : diff < 0 ? -1 : 0);

  const formattedVal = indicator.formatVal(latest.value);
  const formattedDiff = diff !== null
    ? (diff > 0 ? '+' : '') + diff.toFixed(2)
    : '—';

  // Sparkline data: oldest → newest (reverse obs)
  const sparkData = obs.slice().reverse().map(o => parseFloat(o.value));

  const cardId  = `card-${indicator.id}`;
  const chartId = `chart-${indicator.id}`;

  const cls = changeClass(diffDir, indicator.invertColors);

  const card = document.createElement('div');
  card.className = 'card';
  card.id = cardId;
  card.style.setProperty('--card-accent', indicator.accentColor);

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">${indicator.title}</div>
      <div class="card-code">${indicator.id}</div>
    </div>
    <div class="card-value">
      ${formattedVal}<span class="card-unit">${indicator.unit}</span>
    </div>
    <div class="card-change">
      <span class="change-badge ${cls}">
        ${arrow(diffDir)} ${formattedDiff}
      </span>
      <span class="change-label">${indicator.changeLabel}</span>
    </div>
    <div class="sparkline-wrap">
      <canvas id="${chartId}"></canvas>
    </div>
    <div class="card-footer">
      <div class="card-date">최근 데이터: ${formatDate(latest.date)}</div>
      <div class="card-status"></div>
    </div>
  `;

  return { card, chartId, sparkData };
}

function renderError(indicator, message) {
  const card = document.createElement('div');
  card.className = 'card error';
  card.style.setProperty('--card-accent', '#f85149');
  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">${indicator.title}</div>
      <div class="card-code">${indicator.id}</div>
    </div>
    <div class="card-value">데이터 오류</div>
    <div class="card-change">
      <span class="change-badge flat">— —</span>
    </div>
    <div style="font-size:0.75rem;color:var(--accent-red);margin-top:8px;padding:10px;background:rgba(248,81,73,0.08);border-radius:6px;">
      ⚠ ${message}
    </div>
  `;
  return card;
}

async function loadAll() {
  const overlay = document.getElementById('loadingOverlay');
  const grid    = document.getElementById('grid');
  const btn     = document.getElementById('refreshBtn');
  const lastUpd = document.getElementById('lastUpdate');

  overlay.classList.remove('hidden');
  btn.classList.add('loading');
  grid.innerHTML = '';

  // Destroy existing charts
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);

  const results = await Promise.allSettled(
    INDICATORS.map(ind => fetchSeries(ind.id, ind.limit))
  );

  results.forEach((result, i) => {
    const ind = INDICATORS[i];
    if (result.status === 'fulfilled' && result.value.length > 0) {
      const { card, chartId, sparkData } = renderCard(ind, result.value);
      grid.appendChild(card);
      // Draw sparkline after DOM insert
      requestAnimationFrame(() => buildSparkline(chartId, sparkData, ind.accentColor));
    } else {
      const msg = result.reason?.message || '알 수 없는 오류';
      grid.appendChild(renderError(ind, msg));
    }
  });

  // Update timestamp
  const now = new Date();
  lastUpd.textContent = '마지막 업데이트: ' + now.toLocaleString('ko-KR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });

  overlay.classList.add('hidden');
  btn.classList.remove('loading');
}

// Initial load
loadAll();
</script>
</body>
</html>
