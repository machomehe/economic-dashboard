<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제지표 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 16px;
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  h1 { font-size: 1.4rem; font-weight: 700; }
  .subtitle { font-size: 0.75rem; color: #8b949e; margin-top: 4px; }
  .last-update { font-size: 0.72rem; color: #8b949e; text-align: right; }
  .refresh-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .refresh-btn:hover { background: #30363d; }
  .status-bar {
    display: flex; gap: 12px; margin-bottom: 16px;
    font-size: 0.75rem;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-green { background: #3fb950; }
  .dot-blue { background: #58a6ff; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card.up { border-left: 3px solid #3fb950; }
  .card.down { border-left: 3px solid #f85149; }
  .card.neutral { border-left: 3px solid #58a6ff; }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .card-title { font-size: 0.85rem; color: #8b949e; font-weight: 500; }
  .card-id { font-size: 0.7rem; color: #484f58; }
  .card-value { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  .card-change {
    font-size: 0.8rem; margin-bottom: 12px;
    display: flex; align-items: center; gap: 4px;
  }
  .change-up { color: #3fb950; }
  .change-down { color: #f85149; }
  .change-neutral { color: #8b949e; }
  .error-msg { color: #f85149; font-size: 0.8rem; padding: 8px 0; }
  .loading-msg { color: #8b949e; font-size: 0.8rem; padding: 8px 0; }
  .chart-wrap { height: 60px; }
  canvas { max-width: 100%; }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>📊 경제지표 대시보드</h1>
    <div class="subtitle">Federal Reserve Economic Data (FRED) — 실시간 미국 주요 경제지표</div>
  </div>
  <div style="text-align:right">
    <div class="last-update" id="lastUpdate">로딩 중...</div>
    <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
  </div>
</header>

<div class="status-bar">
  <span><span class="status-dot dot-green"></span>FRED API 연결됨</span>
  <span><span class="status-dot dot-blue"></span>데이터 출처: Federal Reserve Bank of St. Louis</span>
</div>

<div class="grid" id="grid"></div>

<script>
const API_KEY = 'dd7096c0a98f837e593a75a4ae24721a';

const INDICATORS = [
  { id: 'FEDFUNDS',      label: '기준금리 (FFR)',          unit: '%',  desc: 'Federal Funds Rate' },
  { id: 'CPIAUCSL',      label: '미국 소비자물가지수 (CPI)', unit: '',   desc: 'Consumer Price Index' },
  { id: 'UNRATE',        label: '실업률',                  unit: '%',  desc: 'Unemployment Rate' },
  { id: 'A191RL1Q225SBEA', label: 'GDP 성장률 (분기)',     unit: '%',  desc: 'Real GDP Growth' },
  { id: 'DGS10',         label: '미 국채 10년',            unit: '%',  desc: '10-Year Treasury' },
  { id: 'DGS2',          label: '미 국채 2년',             unit: '%',  desc: '2-Year Treasury' },
  { id: 'DTWEXBGS',      label: '달러 인덱스 (DXY)',        unit: '',   desc: 'USD Index' },
  { id: 'DCOILWTICO',    label: 'WTI 원유가격',            unit: '$',  desc: 'Oil Price (WTI)' },
];

const charts = {};

function fmtVal(val, unit) {
  if (val === null || val === undefined || isNaN(val)) return 'N/A';
  const num = parseFloat(val).toFixed(2);
  if (unit === '$') return '$' + num;
  if (unit === '%') return num + '%';
  return num;
}

function buildCard(ind) {
  const div = document.createElement('div');
  div.className = 'card neutral';
  div.id = 'card-' + ind.id;
  div.innerHTML = `
    <div class="card-header">
      <span class="card-title">${ind.label}</span>
      <span class="card-id">${ind.id}</span>
    </div>
    <div class="card-value" id="val-${ind.id}"><span class="loading-msg">로딩 중...</span></div>
    <div class="card-change" id="chg-${ind.id}"></div>
    <div class="chart-wrap"><canvas id="chart-${ind.id}"></canvas></div>
  `;
  return div;
}

function renderCard(ind, data) {
  const card = document.getElementById('card-' + ind.id);
  const valEl = document.getElementById('val-' + ind.id);
  const chgEl = document.getElementById('chg-' + ind.id);

  if (!data || data.length === 0) {
    valEl.innerHTML = '<span class="error-msg">⚠ 데이터 없음</span>';
    return;
  }

  // Filter out '.' values and get valid ones
  const valid = data.filter(d => d.value !== '.' && !isNaN(parseFloat(d.value)));
  if (valid.length === 0) {
    valEl.innerHTML = '<span class="error-msg">⚠ 유효 데이터 없음</span>';
    return;
  }

  const latest = parseFloat(valid[0].value);
  const prev   = valid.length > 1 ? parseFloat(valid[1].value) : null;
  const diff   = prev !== null ? latest - prev : null;

  valEl.textContent = fmtVal(latest, ind.unit);

  let changeClass = 'change-neutral', arrow = '→';
  if (diff !== null) {
    if (diff > 0) { changeClass = 'change-up'; arrow = '▲'; }
    else if (diff < 0) { changeClass = 'change-down'; arrow = '▼'; }
    chgEl.innerHTML = `<span class="${changeClass}">${arrow} ${diff > 0 ? '+' : ''}${diff.toFixed(2)}${ind.unit} 전월 대비</span>`;
    card.className = 'card ' + (diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral');
  }

  // Sparkline
  const chartData = valid.slice(0, 13).reverse().map(d => parseFloat(d.value));
  const labels    = valid.slice(0, 13).reverse().map(d => d.date.slice(0, 7));
  const ctx = document.getElementById('chart-' + ind.id);
  if (!ctx) return;

  if (charts[ind.id]) charts[ind.id].destroy();
  const color = diff > 0 ? '#3fb950' : diff < 0 ? '#f85149' : '#58a6ff';

  charts[ind.id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: chartData,
        borderColor: color,
        borderWidth: 1.5,
        fill: true,
        backgroundColor: color + '22',
        pointRadius: 0,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: false }
      },
      animation: false
    }
  });
}

async function fetchIndicator(ind) {
  const url = `https://api.stlouisfed.org/fred/series/observations` +
    `?series_id=${ind.id}` +
    `&api_key=${API_KEY}` +
    `&sort_order=desc` +
    `&limit=13` +
    `&file_type=json`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    renderCard(ind, json.observations || []);
  } catch (e) {
    const valEl = document.getElementById('val-' + ind.id);
    const chgEl = document.getElementById('chg-' + ind.id);
    valEl.innerHTML = '<span class="error-msg">데이터 오류</span>';
    chgEl.innerHTML = `<span class="error-msg">⚠ ${e.message}</span>`;
    console.error(ind.id, e);
  }
}

async function loadAll() {
  document.getElementById('lastUpdate').textContent = '업데이트 중...';
  await Promise.all(INDICATORS.map(fetchIndicator));
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    '마지막 업데이트: ' + now.toLocaleString('ko-KR');
}

// Build grid first
const grid = document.getElementById('grid');
INDICATORS.forEach(ind => grid.appendChild(buildCard(ind)));

// Then load data
loadAll();
</script>
</body>
</html>
