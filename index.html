<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제지표 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f8f8;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px}
h1{font-size:1.3rem;font-weight:700}
.subtitle{font-size:.72rem;color:#888;margin-top:3px}
.last-update{font-size:.7rem;color:#888;text-align:right}
.refresh-btn{background:#f0f0f0;border:1px solid #e0e0e0;color:#1a1a1a;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.78rem;margin-top:4px}
.refresh-btn:hover{background:#e0e0e0}
.status-bar{display:flex;gap:14px;margin-bottom:16px;font-size:.72rem;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:7px 12px;border-radius:8px;background:rgba(0,0,0,0.04);border-left:3px solid #555}
.section-label{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:12px;background:#555;color:#fff}
.section-title{font-size:.9rem;font-weight:600}
.section-desc{font-size:.72rem;color:#888}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:9px;padding:13px;text-decoration:none;display:block;color:inherit;position:relative}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-name{font-size:.83rem;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-symbol{font-size:.65rem;color:#aaa;font-family:monospace;margin-top:2px}
.card-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-top:1px}
.badge{font-size:.6rem;color:#ccc;white-space:nowrap}
.gear-btn{background:none;border:none;cursor:pointer;font-size:.85rem;color:#ccc;padding:0 0 0 2px;line-height:1;transition:color .15s}
.gear-btn:hover{color:#555}
.card-value-row{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.card-value{font-size:1.5rem;font-weight:700}
.card-latest-date{font-size:.65rem;color:#aaa}
.card-change{font-size:.77rem;margin-bottom:9px}
.p{color:#27ae60}.n{color:#9e9e9e}.ng{color:#e53935}
.chart-wrap{height:88px}canvas{max-width:100%}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:min(360px,92vw);box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:.95rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#aaa;line-height:1;padding:0}
.modal-close:hover{color:#333}
.axis-seg-labels{display:flex;margin-bottom:6px}
.axis-seg-lbl{flex:1;text-align:center;font-size:.75rem;font-weight:700}
.axis-track{position:relative;padding-bottom:38px;margin-bottom:6px}
.axis-bar{display:flex;height:10px;border-radius:5px;overflow:hidden}
.axis-bar-seg{flex:1}
.axis-tick{position:absolute;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.axis-tick-line{width:2px;height:14px;background:rgba(0,0,0,0.15)}
.th-input{margin-top:4px;width:62px;padding:5px 4px;border:1px solid #ddd;border-radius:6px;font-size:.84rem;color:#333;text-align:center;display:block}
.th-input:focus{outline:none;border-color:#888}
.axis-hint{font-size:.7rem;color:#bbb;margin-bottom:14px}
.modal-actions{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f0f0f0;padding-top:14px}
.btn-reset{font-size:.75rem;color:#aaa;background:none;border:1px solid #e0e0e0;padding:6px 14px;border-radius:6px;cursor:pointer}
.btn-reset:hover{background:#f5f5f5;color:#555}
.btn-apply{font-size:.78rem;font-weight:600;color:#fff;background:#1a1a1a;border:none;padding:7px 20px;border-radius:6px;cursor:pointer}
.btn-apply:hover{background:#333}
.save-toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:8px;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-toast.show{opacity:1}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div><h1>📊 경제지표 대시보드</h1>
  <div class="subtitle">Federal Reserve Economic Data (FRED) — 미국 주요 경제지표</div></div>
  <div><div class="last-update" id="lastUpdate">로딩 중...</div>
  <button class="refresh-btn" onclick="reloadDash()">↻ 새로고침</button></div>
</header>
<div class="status-bar">
  <span id="statusDot"><span class="dot" style="background:#ccc"></span>데이터 로딩 중...</span>
  <span><span class="dot" style="background:#9e9e9e"></span>출처: FRED</span>
</div>
<div id="dashboard"></div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">기준값 설정</div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div id="modalAxis"></div>
    <div class="modal-actions">
      <button class="btn-reset" id="btnReset">기본값으로 초기화</button>
      <button class="btn-apply" onclick="applyModal()">적용</button>
    </div>
  </div>
</div>

<div class="save-toast" id="toast">✓ 저장됨</div>

<script>
// ── 기본 기준값 (t: [긍정↔중립 경계, 중립↔부정 경계]) ──
const DEFAULT_T={
  FEDFUNDS:    {mode:'level_neg',t:[3.0,4.5],  unit:'%',   label:'정책금리'},
  DFII10:      {mode:'level_neg',t:[0.5,1.5],  unit:'%',   label:'실질금리 10Y'},
  DGS10:       {mode:'level_neg',t:[3.5,4.5],  unit:'%',   label:'국채금리 10Y'},
  T10Y2Y:      {mode:'level_pos',t:[0.0,0.5],  unit:'%',   label:'수익률곡선'},
  DGORDER:     {mode:'dir_pos',  t:[-2.0,0.0], unit:'MoM%',label:'내구재 주문'},
  UNRATE:      {mode:'level_neg',t:[4.5,5.5],  unit:'%',   label:'실업률'},
  PAYEMS:      {mode:'dir_pos',  t:[-50,50],    unit:'천명',label:'비농업고용'},
  INDPRO:      {mode:'dir_pos',  t:[-0.5,0.0], unit:'MoM%',label:'산업생산'},
  CPILFESL:    {mode:'yoy_neg',  t:[3.0,4.0],  unit:'YoY%',label:'코어 CPI'},
  T10YIE:      {mode:'target',   t:[0.7,1.2],  unit:'거리',label:'기대인플레 10Y'},
  CPIAUCSL:    {mode:'yoy_neg',  t:[3.0,4.0],  unit:'YoY%',label:'CPI'},
  BAMLH0A0HYM2:{mode:'level_neg',t:[3.5,5.0],  unit:'%p',  label:'하이일드 스프레드'},
};

function loadT(){
  try{const s=JSON.parse(localStorage.getItem('eco_t3')||'{}');const m={};
    for(const id in DEFAULT_T)m[id]=s[id]?{...DEFAULT_T[id],t:[...s[id].t]}:{...DEFAULT_T[id],t:[...DEFAULT_T[id].t]};
    return m;}
  catch(e){return Object.fromEntries(Object.entries(DEFAULT_T).map(([k,v])=>[k,{...v,t:[...v.t]}]));}
}
function saveT(){const o={};for(const id in T)o[id]={t:[...T[id].t]};localStorage.setItem('eco_t3',JSON.stringify(o));}
let T=loadT();

const C={p:'#27ae60',n:'#9e9e9e',ng:'#e53935'};

function classify(id,value,diff,prev,valid){
  const cfg=T[id];if(!cfg)return'n';
  const[t0,t1]=cfg.t;
  if(cfg.mode==='level_neg'){if(value<=t0)return'p';if(value<=t1)return'n';return'ng';}
  if(cfg.mode==='level_pos'){if(value<t0)return'ng';if(value<t1)return'n';return'p';}
  if(cfg.mode==='target'){const d=Math.abs(value-2.0);if(d<=t0)return'p';if(d<=t1)return'n';return'ng';}
  if(cfg.mode==='yoy_neg'){let v=value;if(valid&&valid.length>=13){const ya=parseFloat(valid[12].value);if(!isNaN(ya)&&ya>0)v=(value/ya-1)*100;}
    if(v<=t0)return'p';if(v<=t1)return'n';return'ng';}
  if(cfg.mode==='dir_pos'){let v=diff||0;if(id==='DGORDER'||id==='INDPRO')v=prev&&prev!==0?(diff/prev)*100:0;
    if(v<t0)return'ng';if(v<t1)return'n';return'p';}
  return'n';
}

const GROUPS=[
  {key:'L',label:'L',name:'유동성',desc:'Liquidity',items:[
    {id:'FEDFUNDS',name:'정책금리',sub:'Fed Funds Target',unit:'%',rel:'neg'},
    {id:'DFII10',name:'실질금리 10Y',sub:'TIPS Real Yield',unit:'%',rel:'neg'},
    {id:'DGS10',name:'국채금리 10Y',sub:'US Treasury 10Y',unit:'%',rel:'neg'},
    {id:'T10Y2Y',name:'수익률곡선',sub:'10Y-2Y Spread',unit:'%',rel:'pos'},
  ]},
  {key:'G',label:'G',name:'성장',desc:'Growth',items:[
    {id:'DGORDER',name:'내구재 주문',sub:'Durable Goods Orders',unit:'',rel:'pos'},
    {id:'UNRATE',name:'실업률',sub:'Unemployment Rate',unit:'%',rel:'neg'},
    {id:'PAYEMS',name:'비농업고용',sub:'NFP (천명)',unit:'',rel:'pos'},
    {id:'INDPRO',name:'산업생산',sub:'Industrial Production',unit:'',rel:'pos'},
  ]},
  {key:'D',label:'D',name:'디스 인플레',desc:'Dis-inflation',items:[
    {id:'CPILFESL',name:'코어 CPI',sub:'Core CPI',unit:'',rel:'neg'},
    {id:'T10YIE',name:'기대인플레 10Y',sub:'Breakeven Inflation',unit:'%',rel:'neg'},
    {id:'CPIAUCSL',name:'CPI',sub:'Headline CPI',unit:'',rel:'neg'},
  ]},
  {key:'R',label:'R',name:'위험',desc:'Risk',items:[
    {id:'BAMLH0A0HYM2',name:'하이일드 스프레드',sub:'HY OAS Spread',unit:'%',rel:'neg'},
  ]},
];

const charts={};let cachedData=null;
function fmtDate(d){const[y,m]=d.split('-');return parseInt(m)+'/'+y.slice(2);}
function fmt(v,u){if(v===null||v===undefined||isNaN(parseFloat(v)))return'N/A';const n=parseFloat(v);const s=Math.abs(n)>=1000?n.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2}):n.toFixed(2);return u==='$'?'$'+s:u==='%'?s+'%':s;}

function buildCard(item){
  const a=document.createElement('a');a.className='card';a.id='card-'+item.id;
  a.href='https://fred.stlouisfed.org/series/'+item.id;a.target='_blank';a.rel='noopener noreferrer';
  const badge=item.rel==='pos'?'비례':'반비례';
  a.innerHTML=
    '<div class="card-header">'+
      '<div><div class="card-name">'+item.name+'</div><div class="card-symbol">'+item.id+' · '+item.sub+'</div></div>'+
      '<div class="card-meta">'+
        '<span class="badge">'+badge+'</span>'+
        '<button class="gear-btn" title="기준값 설정" onclick="openModal(event,\''+item.id+'\')">⚙︎</button>'+
      '</div>'+
    '</div>'+
    '<div class="card-value-row"><div class="card-value" id="val-'+item.id+'"><span style="color:#aaa;font-size:.8rem">—</span></div><div class="card-latest-date" id="date-'+item.id+'"></div></div>'+
    '<div class="card-change" id="chg-'+item.id+'"></div>'+
    '<div class="chart-wrap"><canvas id="chart-'+item.id+'"></canvas></div>';
  return a;
}

function renderCard(item,obs){
  const card=document.getElementById('card-'+item.id);
  const valEl=document.getElementById('val-'+item.id);
  const dateEl=document.getElementById('date-'+item.id);
  const chgEl=document.getElementById('chg-'+item.id);
  if(!card||!valEl)return;
  const valid=(obs||[]).filter(d=>d.value!=='.'&&!isNaN(parseFloat(d.value)));
  if(!valid.length){valEl.innerHTML='<span style="color:#aaa;font-size:.8rem">데이터 없음</span>';return;}
  const latest=parseFloat(valid[0].value),prev=valid.length>1?parseFloat(valid[1].value):null,diff=prev!==null?latest-prev:null;
  const key=classify(item.id,latest,diff,prev,valid),color=C[key];
  valEl.textContent=fmt(latest,item.unit);valEl.style.color=color;
  dateEl.textContent=fmtDate(valid[0].date);
  if(diff!==null){const arrow=diff>0?'▲':diff<0?'▼':'→';chgEl.innerHTML='<span class="'+key+'">'+arrow+' '+(diff>0?'+':'')+diff.toFixed(2)+item.unit+' 전기 대비</span>';}
  const cd=valid.slice(0,13).reverse().map(d=>parseFloat(d.value));
  const lb=valid.slice(0,13).reverse().map(d=>fmtDate(d.date));
  const ctx=document.getElementById('chart-'+item.id);if(!ctx)return;
  if(charts[item.id])charts[item.id].destroy();
  charts[item.id]=new Chart(ctx,{type:'line',data:{labels:lb,datasets:[{data:cd,borderColor:color,borderWidth:1.5,fill:true,backgroundColor:color+'18',pointRadius:3,pointHoverRadius:5,pointBackgroundColor:color,tension:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:true,callbacks:{title:items=>items[0].label,label:c=>' '+fmt(c.parsed.y,item.unit)}}},scales:{x:{display:true,ticks:{color:'#aaa',font:{size:8},maxRotation:45,minRotation:30,callback:function(val,idx,ticks){const label=this.getLabelForValue(val);if(!label)return null;if(idx===ticks.length-1)return label;const month=parseInt(label.split('/')[0]);return(month===1||month===4||month===7||month===10)?label:null;}},grid:{color:'#eeeeee'}},y:{display:true,position:'right',ticks:{color:'#aaa',font:{size:8},maxTicksLimit:3},grid:{color:'#eeeeee'}}},animation:false}});
}

function renderAll(data){GROUPS.forEach(g=>g.items.forEach(item=>renderCard(item,data[item.id]||[])));}

function buildDashboard(){
  const dash=document.getElementById('dashboard');dash.innerHTML='';
  GROUPS.forEach(g=>{
    const sec=document.createElement('div');sec.className='section';
    sec.innerHTML='<div class="section-header"><span class="section-label">'+g.label+'</span><span class="section-title">'+g.name+'</span><span class="section-desc">· '+g.desc+'</span></div><div class="grid" id="grid-'+g.key+'"></div>';
    dash.appendChild(sec);
    const grid=sec.querySelector('#grid-'+g.key);
    g.items.forEach(item=>grid.appendChild(buildCard(item)));
  });
}

async function loadAll(){
  try{
    const r=await fetch('data.json?t='+Date.now());if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();cachedData=j.data;renderAll(cachedData);
    const upd=j.updated?new Date(j.updated).toLocaleString('ko-KR'):'알 수 없음';
    document.getElementById('lastUpdate').textContent='데이터 기준: '+upd;
    document.getElementById('statusDot').innerHTML='<span class="dot" style="background:#27ae60"></span>FRED 연결됨';
  }catch(e){
    document.getElementById('lastUpdate').textContent='⚠ '+e.message;
    document.getElementById('statusDot').innerHTML='<span class="dot" style="background:#e53935"></span>오류';
    console.error(e);
  }
}
function reloadDash(){cachedData=null;buildDashboard();loadAll();}

// ── 모달 ──
let modalId=null;

function openModal(e,id){
  e.preventDefault();e.stopPropagation();
  modalId=id;
  const cfg=T[id];
  document.getElementById('modalTitle').textContent=cfg.label+' ('+cfg.unit+')';

  const rightGood=(cfg.mode==='level_pos'||cfg.mode==='dir_pos');
  const gc='#27ae60',nc='#9e9e9e',bc='#e53935';
  const lc=rightGood?bc:gc, rc=rightGood?gc:bc;
  const ll=rightGood?'나쁨':'좋음', rl=rightGood?'좋음':'나쁨';
  const hint=cfg.mode==='target'?'2%에 가까울수록 좋음':
             rightGood?'높을수록 좋음 →':'← 낮을수록 좋음';
  const hintAlign=rightGood&&cfg.mode!=='target'?'right':'left';

  document.getElementById('modalAxis').innerHTML=
    '<div class="axis-seg-labels">'+
      '<div class="axis-seg-lbl" style="color:'+lc+'">'+ll+'</div>'+
      '<div class="axis-seg-lbl" style="color:'+nc+'">중립</div>'+
      '<div class="axis-seg-lbl" style="color:'+rc+'">'+rl+'</div>'+
    '</div>'+
    '<div class="axis-track">'+
      '<div class="axis-bar">'+
        '<div class="axis-bar-seg" style="background:'+lc+'35;border-top:3px solid '+lc+'"></div>'+
        '<div class="axis-bar-seg" style="background:'+nc+'25;border-top:3px solid '+nc+'"></div>'+
        '<div class="axis-bar-seg" style="background:'+rc+'35;border-top:3px solid '+rc+'"></div>'+
      '</div>'+
      '<div class="axis-tick" style="left:33.33%">'+
        '<div class="axis-tick-line"></div>'+
        '<input class="th-input" type="number" step="0.1" id="th-inp-0" value="'+cfg.t[0]+'">'+
      '</div>'+
      '<div class="axis-tick" style="left:66.66%">'+
        '<div class="axis-tick-line"></div>'+
        '<input class="th-input" type="number" step="0.1" id="th-inp-1" value="'+cfg.t[1]+'">'+
      '</div>'+
    '</div>'+
    '<div class="axis-hint" style="text-align:'+hintAlign+'">'+hint+'</div>';

  document.getElementById('btnReset').onclick=()=>{
    const d=DEFAULT_T[id];
    document.getElementById('th-inp-0').value=d.t[0];
    document.getElementById('th-inp-1').value=d.t[1];
  };
  document.getElementById('modalOverlay').classList.add('open');
}

function applyModal(){
  if(!modalId)return;
  const v0=parseFloat(document.getElementById('th-inp-0').value);
  const v1=parseFloat(document.getElementById('th-inp-1').value);
  if(isNaN(v0)||isNaN(v1))return;
  T[modalId].t=[v0,v1];saveT();
  if(cachedData)renderAll(cachedData);
  closeModalDirect();
  const tm=document.getElementById('toast');tm.classList.add('show');setTimeout(()=>tm.classList.remove('show'),1500);
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');modalId=null;}

buildDashboard();loadAll();
</script>
</body>
</html>
